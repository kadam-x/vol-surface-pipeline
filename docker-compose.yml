services:
  minio:
    image: minio/minio:latest
    container_name: vol-surface-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: vol-surface-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////home/airflow/airflow.db
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      DUCKDB_PATH: /data/duckdb/vol_surface.db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./pipeline:/opt/airflow/pipeline
      - airflow_db:/home/airflow
      - duckdb_data:/data/duckdb
    ports:
      - "8080:8080"
    command: bash /entrypoint.sh
    depends_on:
      minio:
        condition: service_healthy

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: vol-surface-fastapi
    environment:
      DUCKDB_PATH: /data/duckdb/vol_surface.db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - duckdb_data:/data/duckdb
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: vol-surface-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: frser-duckdb-datasource
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
      - duckdb_data:/data/duckdb
    ports:
      - "3000:3000"

volumes:
  minio_data:
  duckdb_data:
  airflow_db:
  grafana_data:
