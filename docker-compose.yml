services:
  minio:
    image: minio/minio:latest
    container_name: vol-surface-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  duckdb:
    image: python:3.11-slim
    container_name: vol-surface-duckdb
    volumes:
      - duckdb_data:/data
    command: ["sleep", "infinity"]

  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: vol-surface-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-SequentialExecutor}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////home/airflow/airflow.db
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./pipeline:/opt/airflow/pipeline
      - airflow_db:/home/airflow
      - duckdb_data:/data/duckdb
    ports:
      - "8080:8080"
    command: >
      bash -c "
        mkdir -p /home/airflow /data/duckdb /opt/airflow/dags /opt/airflow/pipeline &&
        airflow db init &&
        airflow users create -r Admin -u admin -e admin@example.com -p admin -f Admin -l User &&
        airflow webserver &
        sleep 10 &&
        airflow scheduler
      "
    depends_on:
      - minio

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: vol-surface-fastapi
    environment:
      DUCKDB_PATH: /data/warehouse/vol_surface.db
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - duckdb_data:/data/warehouse
    ports:
      - "8000:8000"
    depends_on:
      - duckdb

  grafana:
    image: grafana/grafana:latest
    container_name: vol-surface-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DATOURCES_NAME: DuckDB
      GF_DATOURCES_TYPE: grafana-datasources
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - duckdb

volumes:
  minio_data:
  duckdb_data:
  airflow_db:
  grafana_data: